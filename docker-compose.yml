services:
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v24.2.4
    container_name: analytics-redpanda
    command:
      - redpanda
      - start
      - --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr internal://redpanda:9092,external://localhost:19092
      - --smp 1
      - --memory 1G
      - --overprovisioned
      - --set redpanda.auto_create_topics_enabled=true
    ports:
      - "19092:19092"
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -q 'Healthy'"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 20s

  db:
    image: postgres:16-alpine
    container_name: analytics-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-analytics}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-analytics}
      POSTGRES_DB: ${POSTGRES_DB:-analytics_pipeline}
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./sql/migrations/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U analytics -d analytics_pipeline"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: analytics-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: analytics-migrate
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://analytics:analytics@db:5432/analytics_pipeline
      POSTGRES_HOST: db
    command: ["python", "scripts/migrate.py"]
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: analytics-api
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://analytics:analytics@db:5432/analytics_pipeline
      POSTGRES_HOST: db
      REDIS_HOST: redis
      KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  consumer:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: analytics-consumer
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://analytics:analytics@db:5432/analytics_pipeline
      POSTGRES_HOST: db
      REDIS_HOST: redis
      KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
    command: ["python", "scripts/run_consumer.py"]
    depends_on:
      redpanda:
        condition: service_healthy
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  producer:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: analytics-producer
    env_file:
      - .env
    environment:
      KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
      PRODUCER_INTERVAL_SECONDS: "1.0"
    command: ["python", "scripts/run_producer.py"]
    depends_on:
      redpanda:
        condition: service_healthy

  ui:
    build:
      context: .
      dockerfile: Dockerfile.streamlit
    container_name: analytics-ui
    environment:
      API_BASE_URL: http://api:8000
    ports:
      - "8501:8501"
    depends_on:
      api:
        condition: service_healthy

volumes:
  pgdata:
